version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ushop-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-[REDACTED_DEV_PWD]}
      - POSTGRES_DB=${POSTGRES_DB:-ushop_dev}
    volumes:
      - ushop-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ushop_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ushop-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ushop-redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ushop-pgdata:
    name: ushop-local-pgdata
  ushop-redisdata:
    name: ushop-local-redisdata
