[build]
builder = "DOCKER"
watchPatterns = ["apps/api/**", "packages/shared/**"]

[deploy]
startCommand = "pnpm run start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "4000"
# Set DATABASE_URL, DIRECT_URL, SUPABASE_*, PAYSTACK_*, etc
# in Railway dashboard → Variables (never commit secrets to git)
