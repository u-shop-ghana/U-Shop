[build]
builder = "NIXPACKS"
nixpacksInstallCmd = "npm i -g pnpm && pnpm install --frozen-lockfile"
buildCommand = "cd apps/api && pnpm db:generate && pnpm build"
watchPatterns = ["apps/api/**", "packages/shared/**"]

[deploy]
startCommand = "cd apps/api && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Root directory — must be the MONOREPO root so pnpm workspaces resolve
rootDir = "development"

[env]
NODE_ENV = "production"
PORT = "4000"
# Set DATABASE_URL, DIRECT_URL, SUPABASE_*, PAYSTACK_*, etc
# in Railway dashboard → Variables (never commit secrets to git)
