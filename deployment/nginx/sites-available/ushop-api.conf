# U-Shop Edge API Gateway (NGINX)
# This serves as the blueprint for our API gateway layer.
# It protects the Express application from DDoS, handles rate-limiting
# at the proxy layer, and respects the Cache-Control headers we send from Express.
# 
# Usage:
# ln -s /etc/nginx/sites-available/ushop-api.conf /etc/nginx/sites-enabled/
#
# Remember to configure Cloudflare in front of this for edge caching.

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ushop_cache:10m max_size=1g
                 inactive=60m use_temp_path=off;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name api.ushop-gh.com;

    # Redirect all HTTP traffic to HTTPS (assuming SSL certs exist, e.g., Let's Encrypt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.ushop-gh.com;

    ssl_certificate /etc/nginx/ssl/ushop-api.crt;
    ssl_certificate_key /etc/nginx/ssl/ushop-api.key;
    
    # HSTS Policy
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting for all API endpoints globally at the edge
    limit_req zone=api_limit burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Enable proxy caching. Nginx will respect the Cache-Control headers
        # issued by the Express backend.
        proxy_cache ushop_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # Pass CORS headers down
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Specifically bypass caching dynamically for sensitive routes as a fallback
    location ~* ^/api/v1/(auth|users|checkout) {
        proxy_pass http://127.0.0.1:4000;
        proxy_cache off;
    }
}
